server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # REALTIME1 · R5 — Server-Sent Events stream. Buffering MUST be off so signals flush to the
    # browser immediately (an SSE comment heartbeat keeps the long-lived connection open through
    # idle-timeout proxies; behind Cloudflare the ~20s heartbeat in the app handles the CF idle wall).
    location = /events/stream {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        # NOTE: CF-Connecting-IP is intentionally NOT touched here. The app only
        # trusts it when TRUSTED_PROXY=cloudflare (i.e. the operator asserts the
        # origin is reachable only through Cloudflare, enforced at the firewall).
        # Without that, the app ignores it regardless.
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
