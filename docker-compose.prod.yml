services:
  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

  web:
    image: ${IMAGE_REPO:-ghcr.io/jurczykpawel/replystack}:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      # web sits behind the bundled nginx, which sets X-Real-IP to the real client,
      # so trust forwarding headers for per-IP rate limiting. Override in .env
      # (e.g. TRUSTED_PROXY=cloudflare) if you front it differently.
      TRUSTED_PROXY: ${TRUSTED_PROXY:-proxy}
      # Self-registration stays closed after the first account; set true to open it.
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${IMAGE_REPO:-ghcr.io/jurczykpawel/replystack}-worker:${IMAGE_TAG:-latest}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Optional: NocoDB - uncomment to enable
  # nocodb:
  #   image: nocodb/nocodb:latest
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     NC_DB: "pg://postgres:5432?u=${POSTGRES_USER}&p=${POSTGRES_PASSWORD}&d=${POSTGRES_DB}"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
