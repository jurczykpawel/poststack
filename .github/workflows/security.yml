name: Security - Secret Scan

on:
  push:
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        # Pinned to a commit SHA, not a floating @main: a compromised action would otherwise run
        # arbitrary code on every push/PR with full repo + CI-secret access. Bump the SHA +
        # comment together when upgrading.
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.5
        with:
          extra_args: --only-verified
